<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="100%" style="stop-color:#f0f9ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#2563eb" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#cbd5e1" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="80" r="200" fill="#2563eb" opacity="0.04"/>
  <circle cx="1100" cy="580" r="160" fill="#ea580c" opacity="0.04"/>
  <circle cx="100" cy="550" r="120" fill="#2563eb" opacity="0.04"/>

  <!-- Main card -->
  <rect x="80" y="80" width="650" height="470" rx="28" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="80" y="80" width="650" height="470" rx="28" fill="none" stroke="#e4eaf4" stroke-width="1.5"/>

  <!-- Card inner top accent -->
  <rect x="80" y="80" width="650" height="6" rx="3" fill="#2563eb" opacity="0.15"/>

  <!-- House emoji big -->
  <text x="144" y="202" font-size="64" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🏠</text>

  <!-- Main title -->
  <text x="144" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="42" font-weight="800" fill="#1e293b" letter-spacing="-1">두 사람의 첫 번째 동네</text>

  <!-- Subtitle -->
  <text x="144" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="22" font-weight="400" fill="#64748b">어디서 시작할까요, 우리?</text>

  <!-- Divider -->
  <line x1="144" y1="350" x2="660" y2="350" stroke="#e4eaf4" stroke-width="1.5"/>

  <!-- Badges -->
  <rect x="144" y="370" width="118" height="32" rx="16" fill="#fff3e0" stroke="#fed7aa" stroke-width="1"/>
  <text x="203" y="391" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" font-weight="600" fill="#c2410c" text-anchor="middle">🏢 아파트 매물</text>

  <rect x="272" y="370" width="138" height="32" rx="16" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="341" y="391" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">📊 국토부 실거래가</text>

  <!-- Feature pills row -->
  <rect x="144" y="420" width="90" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="189" y="439" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="500" fill="#16a34a" text-anchor="middle">💑 신혼부부픽</text>

  <rect x="244" y="420" width="82" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="285" y="439" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="500" fill="#2563eb" text-anchor="middle">🌊 마용성광</text>

  <rect x="336" y="420" width="78" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="375" y="439" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="500" fill="#16a34a" text-anchor="middle">🍃 노도강</text>

  <!-- Description text -->
  <text x="144" y="494" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="15" fill="#94a3b8">실거래가 기반 단지 추천 · TOP 3 자동 선정 · 1줄 리뷰</text>

  <!-- Right side — mock result cards -->
  <!-- Card 1 (Gold) -->
  <rect x="790" y="90" width="340" height="130" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="790" y="90" width="340" height="130" rx="16" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <rect x="790" y="90" width="340" height="5" rx="3" fill="#f59e0b"/>
  <text x="810" y="125" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18">🥇</text>
  <text x="840" y="123" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="14" font-weight="700" fill="#1e293b">상계동 주공아파트</text>
  <rect x="840" y="130" width="38" height="18" rx="9" fill="#fef3c7"/>
  <text x="859" y="143" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#d97706" text-anchor="middle">98점</text>
  <text x="810" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#64748b">💰 4.2억 ~ 5.8억  ·  📐 59㎡</text>
  <text x="810" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#94a3b8">🚇 4호선 · 학원가 밀집 · 거래 활발</text>

  <!-- Card 2 (Silver) -->
  <rect x="790" y="240" width="340" height="118" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="790" y="240" width="340" height="118" rx="16" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="790" y="240" width="340" height="4" rx="3" fill="#94a3b8"/>
  <text x="810" y="271" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16">🥈</text>
  <text x="836" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#1e293b">월계동 인덕원아파트</text>
  <text x="810" y="303" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#64748b">💰 3.9억 ~ 5.3억  ·  📐 59~84㎡</text>
  <text x="810" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#94a3b8">🚇 6호선 근접 · 공원 인접 조용한 단지</text>

  <!-- Card 3 (Bronze) -->
  <rect x="790" y="378" width="340" height="100" rx="16" fill="white" filter="url(#shadow2)"/>
  <rect x="790" y="378" width="340" height="100" rx="16" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <rect x="790" y="378" width="340" height="4" rx="3" fill="#d97706" opacity="0.7"/>
  <text x="810" y="406" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15">🥉</text>
  <text x="836" y="405" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#1e293b">도봉동 현대아파트</text>
  <text x="810" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#64748b">💰 4.5억 ~ 5.7억  ·  📐 72㎡</text>
  <text x="810" y="458" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#94a3b8">🚇 1호선 · 넓은 면적 대비 합리적 가격</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1e293b" opacity="0.04"/>
  <text x="80" y="613" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#94a3b8">출처: 국토교통부 실거래가 공개시스템</text>
  <text x="1120" y="613" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#2563eb" text-anchor="end" font-weight="600">newlywed-apt.vercel.app</text>
</svg>
