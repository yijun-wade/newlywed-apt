  <rect x="328" y="280" width="64" height="26" rx="13" fill="white" stroke="#e4eaf4" stroke-width="1"/>
  <text x="360" y="297" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">은평구</text>

