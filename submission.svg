  <text x="1140" y="572" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#ea580c" font-weight="700" text-anchor="end">5.2억</text>
  <line x1="648" y1="586" x2="1172" y2="586" stroke="#f1f5f9" stroke-width="1"/>

