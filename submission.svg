  <text x="648" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#64748b">🚇 4호선 도보 5분  ·  📐 59~84㎡  ·  🏗 1989년식</text>
  <text x="648" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#475569" font-style="italic">"교통 편리하고 학원가 가깝다. 재건축 기대감도 있는 단지."</text>

  <!-- Silver card -->
  <rect x="620" y="336" width="280" height="120" rx="16" fill="white" filter="url(#sm-shadow)"/>
  <rect x="620" y="336" width="280" height="120" rx="16" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
