  <rect x="320" y="238" width="80" height="30" rx="15" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="360" y="257" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="600" fill="#15803d" text-anchor="middle">🍃 노도강</text>

