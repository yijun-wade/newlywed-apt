  <text x="690" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#1e293b" font-weight="600">중계동 청구아파트</text>
  <text x="1140" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#ea580c" font-weight="700" text-anchor="end">5.5억</text>
  <line x1="648" y1="624" x2="1172" y2="624" stroke="#f1f5f9" stroke-width="1"/>

  <text x="648" y="648" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#64748b" font-weight="600">7위</text>
  <text x="690" y="648" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#1e293b" font-weight="600">성북동 래미안아파트</text>
  <text x="1140" y="648" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#ea580c" font-weight="700" text-anchor="end">5.8억</text>
  <line x1="648" y1="662" x2="1172" y2="662" stroke="#f1f5f9" stroke-width="1"/>

  <text x="648" y="686" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" fill="#94a3b8">+ 24개 단지 더 보기…</text>

  <!-- Bottom -->
  <text x="80" y="764" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#94a3b8">출처: 국토교통부 실거래가 공개시스템</text>
  <text x="1200" y="764" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="end">newlywed-apt.vercel.app</text>
