  <text x="144" y="297" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#2563eb" text-anchor="middle">노원구</text>
  <rect x="184" y="280" width="64" height="26" rx="13" fill="white" stroke="#e4eaf4" stroke-width="1"/>
  <text x="216" y="297" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">도봉구</text>
  <rect x="256" y="280" width="64" height="26" rx="13" fill="white" stroke="#e4eaf4" stroke-width="1"/>
