  <text x="945" y="372" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="20">🥉</text>
  <text x="976" y="369" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="14" font-weight="700" fill="#1e293b">도봉동 현대아파트</text>
  <text x="945" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#64748b">💰 4.5억~5.7억  ·  📐 72㎡</text>
  <text x="945" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#94a3b8">🚇 1호선 · 넓은 면적 합리적 가격</text>
  <text x="945" y="442" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="11" fill="#475569" font-style="italic">"가성비 최고, 넓어서 좋아요."</text>

  <!-- Ranked list preview -->
  <rect x="620" y="474" width="580" height="230" rx="16" fill="white" filter="url(#sm-shadow)"/>
  <rect x="620" y="474" width="580" height="230" rx="16" fill="none" stroke="#e4eaf4" stroke-width="1"/>
  <text x="648" y="504" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.5">전체 단지 순위</text>

  <!-- Row items -->
  <text x="648" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#64748b" font-weight="600">4위</text>
  <text x="690" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#1e293b" font-weight="600">공릉동 태릉현대아파트</text>
  <text x="1140" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="13" fill="#ea580c" font-weight="700" text-anchor="end">4.7억</text>
  <line x1="648" y1="548" x2="1172" y2="548" stroke="#f1f5f9" stroke-width="1"/>

