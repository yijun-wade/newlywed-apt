<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="60%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#fff7ed"/>
    </linearGradient>
    <linearGradient id="bluebtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#2563eb" flood-opacity="0.10"/>
    </filter>
    <filter id="sm-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="top3-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#f59e0b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#94a3b8" opacity="0.25"/>
  </pattern>
  <rect width="1280" height="800" fill="url(#dots)"/>

  <!-- Decorative blobs -->
  <circle cx="1180" cy="120" r="240" fill="#2563eb" opacity="0.04"/>
  <circle cx="60" cy="700" r="180" fill="#ea580c" opacity="0.05"/>

  <!-- ───────── LEFT PANEL ───────── -->

  <!-- Header brand -->
  <text x="80" y="96" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="44">🏠</text>
  <text x="138" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="28" font-weight="800" fill="#1e293b" letter-spacing="-0.5">두 사람의 첫 번째 동네</text>
  <text x="138" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="16" font-weight="400" fill="#64748b">어디서 시작할까요, 우리?</text>

  <!-- Badges -->
  <rect x="80" y="136" width="120" height="28" rx="14" fill="#fff3e0" stroke="#fed7aa" stroke-width="1"/>
  <text x="140" y="154" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="600" fill="#c2410c" text-anchor="middle">🏢 아파트 매물</text>
  <rect x="210" y="136" width="140" height="28" rx="14" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="280" y="154" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle">📊 국토부 실거래가</text>

  <!-- Search Card mock -->
  <rect x="80" y="188" width="490" height="380" rx="22" fill="white" filter="url(#card-shadow)"/>
  <rect x="80" y="188" width="490" height="380" rx="22" fill="none" stroke="#e4eaf4" stroke-width="1.5"/>

  <!-- Section: 지역 -->
  <text x="112" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.5">지역 선택</text>

  <!-- Theme pills -->
  <rect x="112" y="238" width="100" height="30" rx="15" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
